<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeBand - إدارة الملف الطبي</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .lang-toggle {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            font-family: sans-serif;
        }
        .lang-toggle:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="page-fade">
    <div class="bg-animation"></div>

    <div class="container">
        <header class="navbar">
            <a href="index.html" class="nav-brand">LifeBand</a>
            <div class="nav-links">
                <a href="index.html" class="nav-item" data-i18n="nav_home">الرئيسية</a>
                <a href="tips.html" class="nav-item" data-i18n="nav_tips">نصائح طبية</a>
                
                <div class="dropdown">
                    <button class="nav-item" style="background:none; border:none; cursor:pointer; font-family: inherit;" data-i18n="nav_specialists">للمختصين ▼</button>
                    <div class="dropdown-content">
                        <a href="volunteering.html" data-i18n="drop_volunteer">التطوع الصحي</a>    
                        <a href="innovation.html" data-i18n="drop_innovation">الابتكار</a>
                        <a href="awareness.html" data-i18n="drop_awareness">التوعية والتثقيف</a>
                        <a href="media.html" data-i18n="drop_media">المركز الإعلامي</a>
                    </div>
                </div>

                <span id="auth-zone"></span>
                <button id="langBtn" class="lang-toggle">EN</button>
                <button id="themeBtn" class="theme-toggle">🌙</button>
            </div>
        </header>

        <main style="display: flex; justify-content: center; padding-top: 20px;">
            <div class="glass-card" style="width: 100%; max-width: 550px; z-index: 10;">
                <h2 id="profileTitle" style="color: var(--primary); margin-bottom: 25px; text-align: center;" data-i18n="profile_title">إدارة الملف الطبي</h2>
                
                <div class="input-group">
                    <label data-i18n="label_full_name">الاسم الكامل:</label>
                    <input type="text" id="userName" class="input-style" placeholder="...">
                </div>

                <div class="input-group" style="margin-top: 15px;">
                    <label data-i18n="label_id">رقم الهوية / الإقامة:</label>
                    <input type="text" id="userIdNo" class="input-style" placeholder="10XXXXXXXX">
                </div>

                <div class="input-group" style="margin-top: 15px;">
                    <label data-i18n="label_blood">فصيلة الدم:</label>
                    <select id="userBlood" class="input-style">
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>

                <div class="input-group" style="margin-top: 20px;">
                    <label data-i18n="label_chronic">الأمراض المزمنة (اختر ما ينطبق):</label>
                    <div id="diseasesList" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                        <label class="check-container"><span data-i18n="dis_diabetes">السكري</span> <input type="checkbox" value="السكري"><span class="checkmark"></span></label>
                        <label class="check-container"><span data-i18n="dis_pressure">الضغط</span> <input type="checkbox" value="الضغط"><span class="checkmark"></span></label>
                        <label class="check-container"><span data-i18n="dis_asthma">الربو</span> <input type="checkbox" value="الربو"><span class="checkmark"></span></label>
                        <label class="check-container"><span data-i18n="dis_heart">أمراض القلب</span> <input type="checkbox" value="أمراض القلب"><span class="checkmark"></span></label>
                        <label class="check-container"><span data-i18n="dis_allergy">حساسية دواء</span> <input type="checkbox" value="حساسية دواء"><span class="checkmark"></span></label>
                        <label class="check-container"><span data-i18n="dis_epilepsy">الصرع</span> <input type="checkbox" value="الصرع"><span class="checkmark"></span></label>
                    </div>
                </div>

                <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 12px;">
                    <button id="saveBtn" class="main-btn" data-i18n="btn_save">💾 حفظ التعديلات</button>
                    <button id="aiTipsBtn" class="main-btn" style="background: linear-gradient(135deg, #6366f1, #a855f7);" data-i18n="btn_ai_tips">✨ نصائح AI مخصصة لحالتي</button>
                    <button id="shareEmergencyBtn" class="main-btn" style="background: var(--secondary);" data-i18n="btn_share">🔗 نسخ رابط الطوارئ الخاص بي</button>
                    <button id="exportBtn" class="main-btn" style="background: var(--glass); color: var(--text-main); border: 1px solid var(--glass-border);" data-i18n="btn_export">📄 تصدير البيانات كملف نصي</button>
                </div>

                <!-- صندوق نصائح AI -->
                <div id="aiTipsBox" style="display:none; margin-top:20px; background:rgba(99,102,241,0.07); border:1px solid rgba(99,102,241,0.25); border-radius:16px; padding:20px;">
                    <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
                        <span style="font-size:22px;">🤖</span>
                        <h4 style="color:#6366f1; margin:0;" data-i18n="ai_tips_title">نصائحك الصحية المخصصة</h4>
                    </div>
                    <div id="aiTipsText" style="font-size:14px; line-height:1.9; white-space:pre-wrap;"></div>
                </div>

                <!-- Chatbot AI -->
                <div style="margin-top:25px; background:rgba(99,102,241,0.05); border:1px solid rgba(99,102,241,0.2); border-radius:16px; padding:20px;">
                    <h4 style="color:#6366f1; margin-bottom:15px;">🤖 <span data-i18n="chatbot_title">المساعد الطبي الذكي</span></h4>
                    <div id="chatMessages" style="max-height:250px; overflow-y:auto; margin-bottom:12px; display:flex; flex-direction:column; gap:10px;"></div>
                    <div style="display:flex; gap:8px;">
                        <input id="chatInput" type="text" class="input-style" style="flex:1; margin-top:0;" data-i18n-placeholder="chatbot_placeholder" placeholder="اسأل عن صحتك...">
                        <button id="chatSendBtn" class="main-btn" style="width:auto; padding:10px 20px;">إرسال</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../config.js"></script>
<script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { medicalChatbot, getPersonalizedTips } from './js/gemini-ai.js';

        // --- 1. نظام الترجمة ---
        const translations = {
            ar: {
                nav_home: "الرئيسية",
                nav_tips: "نصائح طبية",
                nav_specialists: "للمختصين ▼",
                drop_volunteer: "التطوع الصحي",
                drop_innovation: "الابتكار",
                drop_awareness: "التوعية والتثقيف",
                drop_media: "المركز الإعلامي",
                profile_title: "إدارة الملف الطبي",
                label_full_name: "الاسم الكامل:",
                label_id: "رقم الهوية / الإقامة:",
                label_blood: "فصيلة الدم:",
                label_chronic: "الأمراض المزمنة (اختر ما ينطبق):",
                dis_diabetes: "السكري",
                dis_pressure: "الضغط",
                dis_asthma: "الربو",
                dis_heart: "أمراض القلب",
                dis_allergy: "حساسية دواء",
                dis_epilepsy: "الصرع",
                btn_save: "💾 حفظ التعديلات",
                btn_ai_tips: "✨ نصائح AI مخصصة لحالتي",
                btn_share: "🔗 نسخ رابط الطوارئ",
                btn_export: "📄 تصدير البيانات",
                ai_tips_title: "نصائحك الصحية المخصصة",
                chatbot_title: "المساعد الطبي الذكي",
                chatbot_placeholder: "اسأل عن صحتك...",
                lang_label: "EN"
            },
            en: {
                nav_home: "Home",
                nav_tips: "Medical Tips",
                nav_specialists: "Specialists ▼",
                drop_volunteer: "Volunteering",
                drop_innovation: "Innovation",
                drop_awareness: "Awareness",
                drop_media: "Media Center",
                profile_title: "Medical Profile Management",
                label_full_name: "Full Name:",
                label_id: "ID / Residency Number:",
                label_blood: "Blood Type:",
                label_chronic: "Chronic Diseases (Check all that apply):",
                dis_diabetes: "Diabetes",
                dis_pressure: "Hypertension",
                dis_asthma: "Asthma",
                dis_heart: "Heart Disease",
                dis_allergy: "Drug Allergy",
                dis_epilepsy: "Epilepsy",
                btn_save: "💾 Save Changes",
                btn_ai_tips: "✨ My Personalized AI Tips",
                btn_share: "🔗 Copy Emergency Link",
                btn_export: "📄 Export Data",
                ai_tips_title: "Your Personalized Health Tips",
                chatbot_title: "AI Medical Assistant",
                chatbot_placeholder: "Ask about your health...",
                lang_label: "AR"
            }
        };

        const langBtn = document.getElementById('langBtn');

        function setLanguage(lang) {
            const t = translations[lang];
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = t[key];
            });

            langBtn.innerText = t.lang_label;
            localStorage.setItem('preferred_lang', lang);
            updateAuthZoneUI(auth.currentUser);
        }

        langBtn.onclick = () => {
            const current = localStorage.getItem('preferred_lang') || 'ar';
            setLanguage(current === 'ar' ? 'en' : 'ar');
        };

        // --- 2. نظام الثيم ---
        const themeBtn = document.getElementById('themeBtn');
        function applyTheme(theme) {
            if (theme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                themeBtn.innerText = '☀️';
            } else {
                document.body.removeAttribute('data-theme');
                themeBtn.innerText = '🌙';
            }
        }
        applyTheme(localStorage.getItem('theme') || 'light');
        themeBtn.onclick = () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            const nt = isDark ? 'light' : 'dark';
            localStorage.setItem('theme', nt);
            applyTheme(nt);
        };

        // --- 3. إدارة المستخدم والبيانات ---
        function updateAuthZoneUI(user) {
            const lang = localStorage.getItem('preferred_lang') || 'ar';
            const authZone = document.getElementById('auth-zone');
            if (user) {
                authZone.innerHTML = `
                    <a href="profile.html?id=${user.uid}" class="nav-item active">${lang === 'ar' ? 'ملفي الطبي' : 'My Profile'}</a>
                    <button id="logoutBtn" class="nav-item" style="background:none; border:none; cursor:pointer; font-family: inherit; color: #ef4444;">${lang === 'ar' ? 'تسجيل خروج' : 'Logout'}</button>
                `;
                document.getElementById('logoutBtn').onclick = () => {
                    if(confirm(lang === 'ar' ? "تسجيل الخروج؟" : "Logout?")) signOut(auth).then(() => window.location.href = "index.html");
                };
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                updateAuthZoneUI(user);
                const snapshot = await get(ref(db, 'users/' + user.uid)); 
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('userName').value = data.name || "";
                    document.getElementById('userIdNo').value = data.idNo || "";
                    document.getElementById('userBlood').value = data.bloodType || "A+";
                    const savedDiseases = data.diseases || [];
                    document.querySelectorAll('#diseasesList input').forEach(input => {
                        if (savedDiseases.includes(input.value)) input.checked = true;
                    });
                }
            } else {
                window.location.href = "login.html";
            }
        });

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const user = auth.currentUser;
            const lang = localStorage.getItem('preferred_lang') || 'ar';
            if (user) {
                const selectedDiseases = Array.from(document.querySelectorAll('#diseasesList input:checked')).map(i => i.value);
                const newData = {
                    name: document.getElementById('userName').value,
                    idNo: document.getElementById('userIdNo').value,
                    bloodType: document.getElementById('userBlood').value,
                    diseases: selectedDiseases,
                    role: "user"
                };
                try {
                    await set(ref(db, 'users/' + user.uid), newData);
                    alert(lang === 'ar' ? "تم التحديث بنجاح! ✅" : "Updated successfully! ✅");
                } catch (err) { alert(err.message); }
            }
        });

        document.getElementById('shareEmergencyBtn').addEventListener('click', () => {
            const user = auth.currentUser;
            const lang = localStorage.getItem('preferred_lang') || 'ar';
            if (user) {
                const emergencyUrl = `${window.location.origin}${window.location.pathname.replace('profile.html', 'emergency.html')}?id=${user.uid}`;
                navigator.clipboard.writeText(emergencyUrl).then(() => {
                    alert(lang === 'ar' ? "✅ تم نسخ الرابط!" : "✅ Link copied!");
                });
            }
        });

        document.getElementById('exportBtn').onclick = () => {
            const name = document.getElementById('userName').value;
            const content = `LifeBand Medical Profile\nName: ${name}\nID: ${document.getElementById('userIdNo').value}\nBlood: ${document.getElementById('userBlood').value}`;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `LifeBand_${name}.txt`;
            a.click();
        };

        // --- AI: نصائح مخصصة ---
        let currentPatientData = {};
        document.getElementById('aiTipsBtn').addEventListener('click', async () => {
            const tipsBox = document.getElementById('aiTipsBox');
            const tipsText = document.getElementById('aiTipsText');
            tipsBox.style.display = 'block';
            tipsText.innerText = '⏳ جاري تحليل ملفك الطبي...';
            try {
                currentPatientData = {
                    bloodType: document.getElementById('userBlood').value,
                    diseases: Array.from(document.querySelectorAll('#diseasesList input:checked')).map(i => i.value)
                };
                const tips = await getPersonalizedTips(currentPatientData);
                tipsText.innerText = tips;
            } catch(e) {
                tipsText.innerText = '⚠️ تعذّر الاتصال بـ AI. تأكد من مفتاح Gemini.';
            }
        });

        // --- AI: Chatbot طبي ---
        function appendMessage(text, isUser) {
            const chatMessages = document.getElementById('chatMessages');
            const bubble = document.createElement('div');
            bubble.style.cssText = `
                padding: 10px 15px; border-radius: 14px; max-width: 85%; font-size: 14px; line-height: 1.7;
                ${isUser 
                    ? 'background:#6366f1; color:white; align-self:flex-end; border-bottom-right-radius:4px;' 
                    : 'background:rgba(0,0,0,0.06); align-self:flex-start; border-bottom-left-radius:4px;'}
            `;
            bubble.innerText = text;
            chatMessages.appendChild(bubble);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        document.getElementById('chatSendBtn').addEventListener('click', async () => {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            appendMessage(msg, true);
            const thinking = document.createElement('div');
            thinking.id = 'thinking';
            thinking.style.cssText = 'padding:10px 15px; border-radius:14px; background:rgba(0,0,0,0.06); align-self:flex-start; font-size:13px; opacity:0.6;';
            thinking.innerText = '⏳ ...';
            document.getElementById('chatMessages').appendChild(thinking);
            try {
                const patientCtx = {
                    bloodType: document.getElementById('userBlood').value,
                    diseases: Array.from(document.querySelectorAll('#diseasesList input:checked')).map(i => i.value)
                };
                const reply = await medicalChatbot(msg, patientCtx);
                document.getElementById('thinking')?.remove();
                appendMessage(reply, false);
            } catch(e) {
                document.getElementById('thinking')?.remove();
                appendMessage('⚠️ تعذّر الاتصال بـ AI.', false);
            }
        });

        document.getElementById('chatInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('chatSendBtn').click();
        });

        // تشغيل اللغة عند التحميل
        setLanguage(localStorage.getItem('preferred_lang') || 'ar');
    </script>
</body>
</html>
