<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeBand – نصائح طبية يومية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ─── Unified background ─── */
        :root {
            --bg:       #f7fafc;
            --card:     #ffffff;
            --border:   #e2e8f0;
            --text:     #2d3748;
            --muted:    #718096;
            --primary:  #e53e3e;
            --accent:   #6366f1;
            --success:  #38a169;
        }
        html[data-theme="dark"] {
            --bg:     #0f1117;
            --card:   #1a202c;
            --border: #2d3748;
            --text:   #e2e8f0;
            --muted:  #a0aec0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .bg-mesh {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse at 10% 20%, rgba(99,102,241,0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 90% 80%, rgba(229,62,62,0.05) 0%, transparent 50%),
                var(--bg);
        }
        html[data-theme="dark"] .bg-mesh {
            background:
                radial-gradient(ellipse at 10% 20%, rgba(99,102,241,0.10) 0%, transparent 55%),
                radial-gradient(ellipse at 90% 80%, rgba(229,62,62,0.07) 0%, transparent 50%),
                var(--bg);
        }

        .tips-page {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        /* ─── Page header ─── */
        .page-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
        }
        .page-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--text);
            line-height: 1.2;
        }
        .page-title span { color: var(--accent); }
        .page-meta {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .freshness-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }
        .freshness-dot.stale { background: var(--muted); }

        .header-actions { display: flex; gap: 10px; align-items: center; }
        .refresh-btn {
            padding: 10px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            color: var(--text);
            display: flex; align-items: center; gap: 6px;
            transition: 0.2s;
        }
        .refresh-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .refresh-btn.loading .refresh-icon { animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Category tabs ─── */
        .cat-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .cat-tab {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--card);
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            color: var(--muted);
            transition: 0.2s;
        }
        .cat-tab:hover { border-color: var(--accent); color: var(--accent); }
        .cat-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* ─── Loading skeleton ─── */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .skeleton-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px;
            animation: shimmer 1.4s ease infinite;
        }
        @keyframes shimmer {
            0%,100%{opacity:1} 50%{opacity:0.5}
        }
        .skel-line {
            height: 12px;
            background: var(--border);
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .skel-line.short { width: 60%; }
        .skel-line.long  { width: 100%; }

        /* ─── Tips grid ─── */
        .tips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 16px;
        }

        .tip-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: default;
        }
        .tip-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        .tip-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 4px;
            height: 100%;
            background: var(--tip-color, var(--accent));
            border-radius: 0 18px 18px 0;
        }

        .tip-cat-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 12px;
            background: var(--tip-bg, rgba(99,102,241,0.1));
            color: var(--tip-color, var(--accent));
        }
        .tip-title {
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .tip-body {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.8;
        }
        .tip-number {
            position: absolute;
            bottom: 14px;
            left: 16px;
            font-size: 40px;
            font-weight: 900;
            opacity: 0.04;
            color: var(--tip-color, var(--accent));
            user-select: none;
        }

        /* ─── Featured tip (first card) ─── */
        .tip-card.featured {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 20px;
            align-items: center;
            border-width: 1.5px;
        }
        @media (max-width: 560px) {
            .tip-card.featured { grid-template-columns: 1fr; }
        }
        .featured-icon {
            font-size: 56px;
            text-align: center;
        }

        /* ─── Personalized banner ─── */
        .personal-banner {
            display: none;
            background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(229,62,62,0.06));
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 24px;
            align-items: center;
            gap: 14px;
        }
        .personal-banner.show { display: flex; }
        .personal-banner-icon { font-size: 28px; }
        .personal-banner-text { flex: 1; }
        .personal-banner-text h4 { font-size: 14px; font-weight: 800; color: var(--accent); margin-bottom: 3px; }
        .personal-banner-text p  { font-size: 12px; color: var(--muted); }

        /* ─── Next refresh countdown ─── */
        .next-refresh {
            text-align: center;
            margin-top: 36px;
            padding: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 13px;
            color: var(--muted);
        }
        .next-refresh strong { color: var(--text); font-weight: 700; }

        /* ─── Error state ─── */
        .error-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .error-state h3 { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
        .error-state p  { font-size: 14px; line-height: 1.7; margin-bottom: 20px; }
        .retry-btn {
            padding: 12px 28px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .retry-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="bg-animation"></div>
<div class="bg-mesh"></div>
<div class="container" id="main-layout">

    <div class="tips-page">

        <!-- ─── Header ─── -->
        <div class="page-top">
            <div>
                <h1 class="page-title" id="pageTitle">نصائح <span>طبية</span> يومية</h1>
                <div class="page-meta">
                    <div class="freshness-dot" id="freshnessDot"></div>
                    <span id="freshnessMeta">جاري التحميل...</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()" disabled>
                    <span class="refresh-icon" id="refreshIcon">🔄</span>
                    <span id="refreshBtnText">Refresh</span>
                </button>
            </div>
        </div>

        <!-- ─── Personalized banner ─── -->
        <div class="personal-banner" id="personalBanner">
            <span class="personal-banner-icon">👤</span>
            <div class="personal-banner-text">
                <h4 id="personalTitle"></h4>
                <p id="personalDesc"></p>
            </div>
        </div>

        <!-- ─── Category tabs ─── -->
        <div class="cat-tabs" id="catTabs"></div>

        <!-- ─── Loading skeleton ─── -->
        <div class="skeleton-grid" id="skeletonGrid">
            ${Array.from({length:6}, () => `
                <div class="skeleton-card">
                    <div class="skel-line short" style="width:40%;height:16px;margin-bottom:16px;"></div>
                    <div class="skel-line long"></div>
                    <div class="skel-line long"></div>
                    <div class="skel-line short"></div>
                </div>
            `).join('')}
        </div>

        <!-- ─── Tips grid ─── -->
        <div class="tips-grid" id="tipsGrid" style="display:none;"></div>

        <!-- ─── Error state ─── -->
        <div class="error-state" id="errorState" style="display:none;">
            <div style="font-size:48px;margin-bottom:12px;">😕</div>
            <h3 id="errorTitle">تعذّر تحميل النصائح</h3>
            <p id="errorMsg">تحقق من الاتصال بالإنترنت وأعد المحاولة.</p>
            <button class="retry-btn" onclick="loadTips(true)" id="retryBtn">🔄 إعادة المحاولة</button>
        </div>

        <!-- ─── Next refresh ─── -->
        <div class="next-refresh" id="nextRefreshBox" style="display:none;">
            <strong>⏰</strong> <span id="nextRefreshLabel">تتجدد النصائح تلقائياً كل 24 ساعة.</span>
            <span id="nextRefreshPrefix">التحديث التالي:</span> <strong id="nextRefreshTime"></strong>
        </div>
    </div>

</div>

<script type="module">
import { auth, db } from './js/firebase-config.js';
import { ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { askGroq } from './js/gemini-ai.js';
import { injectLayout } from './js/layout.js';

injectLayout();

const CACHE_KEY      = 'tips_cache';
const REFRESH_HOURS  = 24;
const COOLDOWN_MINS  = 60;
const TIPS_FIREBASE  = 'daily_tips';

// Returns the current language preference
const lang = () => localStorage.getItem('preferred_lang') || 'ar';
const isAr = () => lang() === 'ar';

// Category display configuration for both languages
const CAT_CONFIG = {
    'قلب':    { color: '#e53e3e', bg: 'rgba(229,62,62,0.1)',    icon: '❤️' },
    'تغذية':  { color: '#38a169', bg: 'rgba(56,161,105,0.1)',   icon: '🥗' },
    'رياضة':  { color: '#3182ce', bg: 'rgba(49,130,206,0.1)',   icon: '🏃' },
    'نوم':    { color: '#805ad5', bg: 'rgba(128,90,213,0.1)',   icon: '😴' },
    'ضغط':    { color: '#d69e2e', bg: 'rgba(214,158,46,0.1)',   icon: '🩺' },
    'عام':    { color: '#6366f1', bg: 'rgba(99,102,241,0.1)',   icon: '💡' },
    'سكر':    { color: '#e53e3e', bg: 'rgba(229,62,62,0.08)',   icon: '🩸' },
    'ذهني':   { color: '#6366f1', bg: 'rgba(99,102,241,0.08)', icon: '🧠' },
    'heart':     { color: '#e53e3e', bg: 'rgba(229,62,62,0.1)',    icon: '❤️' },
    'nutrition': { color: '#38a169', bg: 'rgba(56,161,105,0.1)',   icon: '🥗' },
    'exercise':  { color: '#3182ce', bg: 'rgba(49,130,206,0.1)',   icon: '🏃' },
    'sleep':     { color: '#805ad5', bg: 'rgba(128,90,213,0.1)',   icon: '😴' },
    'pressure':  { color: '#d69e2e', bg: 'rgba(214,158,46,0.1)',   icon: '🩺' },
    'general':   { color: '#6366f1', bg: 'rgba(99,102,241,0.1)',   icon: '💡' },
    'diabetes':  { color: '#e53e3e', bg: 'rgba(229,62,62,0.08)',   icon: '🩸' },
    'mental':    { color: '#6366f1', bg: 'rgba(99,102,241,0.08)', icon: '🧠' },
};

// Category tabs definition per language
const CAT_TABS = {
    ar: [
        { key: 'all', label: '🏥 الكل' },
        { key: 'قلب', label: '❤️ القلب' },
        { key: 'تغذية', label: '🥗 التغذية' },
        { key: 'رياضة', label: '🏃 الرياضة' },
        { key: 'نوم', label: '😴 النوم' },
        { key: 'ضغط', label: '🩺 الضغط' }
    ],
    en: [
        { key: 'all', label: '🏥 All' },
        { key: 'heart', label: '❤️ Heart' },
        { key: 'nutrition', label: '🥗 Nutrition' },
        { key: 'exercise', label: '🏃 Exercise' },
        { key: 'sleep', label: '😴 Sleep' },
        { key: 'pressure', label: '🩺 Pressure' }
    ]
};

// Renders category filter tabs based on current language
function renderCatTabs() {
    const tabs = CAT_TABS[lang()] || CAT_TABS.ar;
    document.getElementById('catTabs').innerHTML = tabs.map((t, i) =>
        `<button class="cat-tab${i===0?' active':''}" onclick="filterCat('${t.key}', this)">${t.label}</button>`
    ).join('');
}

// Applies all language-dependent UI text on the page
function applyPageLang() {
    const ar = isAr();
    document.getElementById('pageTitle').innerHTML = ar ? 'نصائح <span>طبية</span> يومية' : 'Daily <span>Medical</span> Tips';
    document.getElementById('freshnessMeta').textContent = ar ? 'جاري التحميل...' : 'Loading...';
    document.getElementById('refreshBtnText').textContent = ar ? 'تحديث' : 'Refresh';
    document.getElementById('errorTitle').textContent = ar ? 'تعذّر تحميل النصائح' : 'Failed to load tips';
    document.getElementById('retryBtn').textContent = ar ? '🔄 إعادة المحاولة' : '🔄 Retry';
    document.getElementById('nextRefreshLabel').textContent = ar ? 'تتجدد النصائح تلقائياً كل 24 ساعة.' : 'Tips refresh automatically every 24 hours.';
    document.getElementById('nextRefreshPrefix').textContent = ar ? 'التحديث التالي:' : 'Next refresh:';
    renderCatTabs();
}

let allTips  = [];
let userData = null;
let lastManualRefresh = parseInt(localStorage.getItem('tips_last_manual') || '0');

// Listens for auth state and loads user data before fetching tips
onAuthStateChanged(auth, async user => {
    if (user) {
        try {
            const snap = await get(ref(db, `users/${user.uid}`));
            if (snap.exists()) userData = snap.val();
        } catch(e) {}
    }
    applyPageLang();
    loadTips();
});

// Loads tips from Firebase cache or generates new ones via AI
async function loadTips(forceRefresh = false) {
    showSkeleton();
    const ar = isAr();

    // Check Firebase cache first
    const fbKey = ar ? TIPS_FIREBASE : TIPS_FIREBASE + '_en';
    try {
        const snap = await get(ref(db, fbKey));
        if (snap.exists()) {
            const cached = snap.val();
            const ageMs  = Date.now() - (cached.generatedAt || 0);
            const isOld  = ageMs > REFRESH_HOURS * 60 * 60 * 1000;

            if (!forceRefresh && !isOld && cached.tips && cached.tips.length > 0) {
                allTips = cached.tips;
                renderTips(cached);
                return;
            }
        }
    } catch(e) {}

    // Generate new tips
    try {
        const tips = await generateTips();
        if (tips && tips.length > 0) {
            allTips = tips;
            const payload = { tips, generatedAt: Date.now() };
            try { await set(ref(db, fbKey), payload); } catch(e) {}
            renderTips(payload);
        } else {
            showError(ar ? 'لم يتم الحصول على نصائح. حاول مرة أخرى.' : 'No tips received. Please try again.');
        }
    } catch(err) {
        showError(err.message || (ar ? 'حدث خطأ أثناء التوليد.' : 'An error occurred while generating.'));
    }
}

// Generates medical tips via Groq AI in the current language
async function generateTips() {
    const ar = isAr();

    const personalContext = userData
        ? (ar
            ? `المستخدم: فصيلة دم ${userData.bloodType || 'غير محدد'}، أمراض مزمنة: ${(userData.diseases || []).join('، ') || 'لا يوجد'}.`
            : `User: Blood type ${userData.bloodType || 'Not specified'}, chronic diseases: ${(userData.diseases || []).join(', ') || 'None'}.`)
        : (ar ? 'المستخدم: لا توجد بيانات شخصية.' : 'User: No personal data available.');

    const today = new Date().toLocaleDateString(ar ? 'ar-SA' : 'en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    const prompt = ar
        ? `أنت طبيب متخصص في الصحة العامة. اليوم ${today}.
${personalContext}

أنشئ 8 نصائح طبية متنوعة ومفيدة. يجب أن تشمل الفئات: قلب، تغذية، رياضة، نوم، ضغط، عام.
${userData ? 'راعي الحالة الصحية للمستخدم في بعض النصائح.' : ''}

أجب بـ JSON فقط (بدون markdown أو backticks) بهذا الشكل EXACTLY:
[
  {"cat":"قلب","title":"عنوان قصير","body":"شرح مفيد من سطرين إلى ثلاثة أسطر."},
  {"cat":"تغذية","title":"...","body":"..."}
]

القواعد:
- العنوان: 3-5 كلمات
- الشرح: 20-40 كلمة
- الفئات المسموحة: قلب / تغذية / رياضة / نوم / ضغط / عام / سكر / ذهني
- أجب بالعربية فقط
- لا تضف أي نص خارج الـ JSON`
        : `You are a public health specialist doctor. Today is ${today}.
${personalContext}

Generate 8 diverse and useful medical tips. They should cover categories: heart, nutrition, exercise, sleep, pressure, general.
${userData ? 'Consider the user health conditions in some tips.' : ''}

Respond with JSON ONLY (no markdown or backticks) in this format EXACTLY:
[
  {"cat":"heart","title":"Short title","body":"Useful explanation in two to three lines."},
  {"cat":"nutrition","title":"...","body":"..."}
]

Rules:
- Title: 3-5 words
- Body: 20-40 words
- Allowed categories: heart / nutrition / exercise / sleep / pressure / general / diabetes / mental
- Answer in English only
- Do not add any text outside the JSON`;

    const raw = await askGroq(prompt);

    // Safely parses JSON response from AI
    let parsed = [];
    try {
        const clean = raw.replace(/```json|```/g, '').trim();
        parsed = JSON.parse(clean);
        if (!Array.isArray(parsed)) throw new Error('Not array');
    } catch(e) {
        const match = raw.match(/\[[\s\S]*\]/);
        if (match) {
            try { parsed = JSON.parse(match[0]); } catch(e2) {
                throw new Error(ar ? 'تعذّر تحليل استجابة AI' : 'Failed to parse AI response');
            }
        } else {
            throw new Error(ar ? 'استجابة AI غير صالحة' : 'Invalid AI response');
        }
    }

    return parsed.filter(t => t.cat && t.title && t.body);
}

// Renders the tips UI including meta info, personalized banner, and refresh controls
function renderTips(payload) {
    hideSkeleton();
    const ar = isAr();
    const tips = payload.tips || [];
    allTips    = tips;

    if (tips.length === 0) { showError(ar ? 'لا توجد نصائح متاحة.' : 'No tips available.'); return; }

    // Update meta
    const genDate  = new Date(payload.generatedAt);
    const ageMs    = Date.now() - payload.generatedAt;
    const oldFlag  = ageMs > REFRESH_HOURS * 60 * 60 * 1000;
    const dot      = document.getElementById('freshnessDot');
    dot.className  = `freshness-dot${oldFlag ? ' stale' : ''}`;
    const locale   = ar ? 'ar-SA' : 'en-US';
    document.getElementById('freshnessMeta').textContent =
        ar ? `آخر تحديث: ${genDate.toLocaleString(locale)} ${oldFlag ? '(قديم)' : ''}`
           : `Last update: ${genDate.toLocaleString(locale)} ${oldFlag ? '(outdated)' : ''}`;

    // Personalized banner
    if (userData) {
        document.getElementById('personalBanner').classList.add('show');
        document.getElementById('personalTitle').textContent =
            ar ? `نصائح مخصصة لـ ${userData.name || 'حسابك'}` : `Personalized tips for ${userData.name || 'you'}`;
        const parts = [];
        if (userData.bloodType) parts.push(ar ? `فصيلة دم ${userData.bloodType}` : `Blood type ${userData.bloodType}`);
        if (userData.diseases && userData.diseases.length) parts.push(ar ? `${userData.diseases.length} حالة مزمنة` : `${userData.diseases.length} chronic condition(s)`);
        document.getElementById('personalDesc').textContent =
            parts.length ? (ar ? `بناءً على: ${parts.join('، ')}` : `Based on: ${parts.join(', ')}`) : (ar ? 'بيانات حسابك الصحي' : 'Your health account data');
    }

    // Enable refresh button
    const canRefresh = (Date.now() - lastManualRefresh) > COOLDOWN_MINS * 60 * 1000;
    const btn = document.getElementById('refreshBtn');
    btn.disabled = !canRefresh;
    if (!canRefresh) {
        const remainMin = Math.ceil((COOLDOWN_MINS * 60 * 1000 - (Date.now() - lastManualRefresh)) / 60000);
        document.getElementById('refreshBtnText').textContent = ar ? `تحديث (${remainMin} د)` : `Refresh (${remainMin}m)`;
    } else {
        btn.disabled = false;
        document.getElementById('refreshBtnText').textContent = ar ? 'تحديث' : 'Refresh';
    }

    // Next refresh time
    const nextRefresh = new Date(payload.generatedAt + REFRESH_HOURS * 60 * 60 * 1000);
    document.getElementById('nextRefreshTime').textContent = nextRefresh.toLocaleString(locale);
    document.getElementById('nextRefreshBox').style.display = 'block';

    renderFilteredTips(tips);
}

// Renders the filtered tip cards into the grid
function renderFilteredTips(tips) {
    const ar = isAr();
    const grid = document.getElementById('tipsGrid');
    grid.style.display = 'grid';
    grid.innerHTML = '';

    if (tips.length === 0) {
        grid.innerHTML = `<p style="color:var(--muted);text-align:center;grid-column:1/-1;padding:40px 0;">${ar ? 'لا توجد نصائح في هذه الفئة.' : 'No tips in this category.'}</p>`;
        return;
    }

    tips.forEach((tip, idx) => {
        const cfg   = CAT_CONFIG[tip.cat] || CAT_CONFIG[ar ? 'عام' : 'general'];
        const isFeatured = idx === 0;

        const card  = document.createElement('div');
        card.className  = `tip-card${isFeatured ? ' featured' : ''}`;
        card.style.cssText = `--tip-color:${cfg.color};--tip-bg:${cfg.bg};`;
        card.innerHTML = isFeatured ? `
            <div class="featured-icon">${cfg.icon}</div>
            <div>
                <div class="tip-cat-badge">${cfg.icon} ${tip.cat}</div>
                <div class="tip-title">${tip.title}</div>
                <div class="tip-body">${tip.body}</div>
            </div>
            <span class="tip-number">${idx + 1}</span>
        ` : `
            <div class="tip-cat-badge">${cfg.icon} ${tip.cat}</div>
            <div class="tip-title">${tip.title}</div>
            <div class="tip-body">${tip.body}</div>
            <span class="tip-number">${idx + 1}</span>
        `;
        grid.appendChild(card);
    });
}

// Handles category tab filter clicks
window.filterCat = (cat, btn) => {
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = cat === 'all' ? allTips : allTips.filter(t => t.cat === cat);
    renderFilteredTips(filtered);
};

// Handles manual refresh button click with cooldown
window.manualRefresh = async () => {
    const ar = isAr();
    const btn  = document.getElementById('refreshBtn');
    const icon = document.getElementById('refreshIcon');
    btn.disabled = true;
    btn.classList.add('loading');
    icon.textContent = '↻';
    document.getElementById('refreshBtnText').textContent = ar ? 'جاري التحديث...' : 'Refreshing...';
    document.getElementById('tipsGrid').style.display  = 'none';
    document.getElementById('nextRefreshBox').style.display = 'none';

    lastManualRefresh = Date.now();
    localStorage.setItem('tips_last_manual', lastManualRefresh);

    await loadTips(true);
    btn.classList.remove('loading');
    icon.textContent = '🔄';
};

// Shows the loading skeleton placeholder
function showSkeleton() {
    document.getElementById('skeletonGrid').style.display = 'grid';
    document.getElementById('tipsGrid').style.display     = 'none';
    document.getElementById('errorState').style.display   = 'none';
    document.getElementById('nextRefreshBox').style.display = 'none';
}

// Hides the loading skeleton
function hideSkeleton() {
    document.getElementById('skeletonGrid').style.display = 'none';
    document.getElementById('errorState').style.display   = 'none';
}

// Displays an error message and re-enables the refresh button
function showError(msg) {
    hideSkeleton();
    document.getElementById('tipsGrid').style.display   = 'none';
    document.getElementById('errorState').style.display = 'block';
    document.getElementById('errorMsg').textContent     = msg;
    document.getElementById('refreshBtn').disabled      = false;
    document.getElementById('refreshBtnText').textContent = isAr() ? 'تحديث' : 'Refresh';
}

window.loadTips = loadTips;

// Applies the saved theme on page load
const theme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', theme);
</script>
</body>
</html>
