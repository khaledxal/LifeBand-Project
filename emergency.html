<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeBand - Emergency</title>
    <style>
        :root { --primary: #ef4444; --glass: rgba(255,255,255,0.92); --text-main: #333; --accent: #6366f1; --tg: #229ED9; }
        html[data-theme="dark"] { --glass: rgba(30,32,40,0.95); --text-main: #e2e8f0; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg,#fee2e2,#f0f2f5); margin: 0; min-height: 100vh; }
        html[data-theme="dark"] body { background: linear-gradient(135deg,#1a0a0a,#0f1020); }
        .emergency-container { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }
        .lang-toggle { position: fixed; top: 20px; right: 20px; background: var(--glass); border: 1px solid #ddd; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: bold; z-index: 100; color: var(--text-main); }
        [dir="ltr"] .lang-toggle { right: auto; left: 20px; }
        .glass-card { background: var(--glass); padding: 30px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); width: 100%; max-width: 560px; margin-top: 20px; }
        .hold-circle { position: relative; width: 180px; height: 180px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #ddd; margin: 0 auto; user-select: none; }
        .progress-ring { position: absolute; top: -5px; left: -5px; transform: rotate(-90deg); }
        .progress-ring__circle { stroke-dasharray: 565.48; stroke-dashoffset: 565.48; transition: stroke-dashoffset 0.1s linear; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 28px; height: 28px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .main-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 15px; transition: 0.2s; font-family: inherit; }
        .main-btn:hover:not(:disabled) { opacity: 0.88; }
        .main-btn:disabled { opacity: 0.55; cursor: not-allowed; }
        #diagSection { display: none; }
        .diag-form { text-align: right; }
        .diag-q { margin-bottom: 18px; }
        .diag-q label { font-weight: bold; font-size: 14px; color: #444; display: block; margin-bottom: 6px; }
        html[data-theme="dark"] .diag-q label { color: #ccc; }
        .diag-q label .q-num { background: var(--primary); color: white; border-radius: 50%; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; margin-left: 6px; }
        .diag-options { display: flex; flex-wrap: wrap; gap: 8px; }
        .diag-options button { padding: 8px 16px; border-radius: 20px; border: 2px solid #e5e7eb; background: white; cursor: pointer; font-size: 13px; transition: 0.2s; font-family: inherit; }
        html[data-theme="dark"] .diag-options button { background: #1e2030; border-color: #333; color: #ccc; }
        .diag-options button.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .diag-options button:hover:not(.selected) { border-color: var(--primary); color: var(--primary); }
        .result-box { background: rgba(16,185,129,0.08); padding: 18px; border-radius: 15px; border-right: 5px solid #10b981; text-align: right; margin-bottom: 12px; }
        .ai-box { background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.25); border-right: 5px solid var(--accent); padding: 18px; border-radius: 15px; margin-bottom: 12px; text-align: right; }
        .ai-box h4 { color: var(--accent); margin: 0 0 10px; display: flex; align-items: center; gap: 6px; }
        #aiAnalysisText { font-size: 14px; line-height: 1.9; white-space: pre-line; color: var(--text-main); }
        .media-box { margin-top: 15px; }
        .media-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 10px; }
        .media-img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; cursor: pointer; }
        .yt-thumb { position: relative; cursor: pointer; border-radius: 10px; overflow: hidden; }
        .yt-thumb img { width: 100%; height: 100px; object-fit: cover; display: block; }
        .yt-thumb .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.35); font-size: 32px; }
        #imgModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:999; align-items:center; justify-content:center; }
        #imgModal.open { display:flex; }
        #imgModal img { max-width:90vw; max-height:90vh; border-radius:12px; }
        #imgModal span { position:absolute; top:20px; right:25px; color:white; font-size:30px; cursor:pointer; }
        .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #e5e7eb; transition: 0.3s; }
        .step-dot.active { background: var(--primary); transform: scale(1.3); }
        .step-dot.done { background: #10b981; }

        /* بطاقة تيليغرام */
        .tg-card { border-radius: 16px; padding: 16px 18px; margin-bottom: 14px; display: flex; align-items: flex-start; gap: 14px; border: 1.5px solid rgba(34,158,217,0.25); background: rgba(34,158,217,0.06); transition: all 0.5s ease; }
        .tg-card.sent   { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.35); }
        .tg-card.failed { background: rgba(239,68,68,0.07);  border-color: rgba(239,68,68,0.3); }
        .tg-card.no-num { background: rgba(245,158,11,0.07); border-color: rgba(245,158,11,0.3); }
        .tg-emoji { font-size: 28px; flex-shrink: 0; }
        .tg-body { flex: 1; min-width: 0; }
        .tg-title { font-weight: bold; font-size: 14px; margin-bottom: 4px; color: var(--tg); }
        .tg-card.sent   .tg-title { color: #10b981; }
        .tg-card.failed .tg-title { color: #ef4444; }
        .tg-card.no-num .tg-title { color: #f59e0b; }
        .tg-detail { font-size: 12px; opacity: 0.75; line-height: 1.6; color: var(--text-main); }
        .pulsing { animation: pulse 1.1s ease-in-out infinite; }
    </style>
</head>
<body>
<button id="langBtn" class="lang-toggle">EN</button>
<div class="emergency-container">

    <div id="triggerSection" class="glass-card" style="text-align:center;">
        <h2 style="color:var(--primary);" data-i18n="em_title">نظام LifeBand للطوارئ</h2>
        <div id="holdBtn" class="hold-circle">
            <span id="holdText" style="font-weight:bold;" data-i18n="em_hold">اضغط مطولاً<br>لفتح الملف</span>
            <svg width="190" height="190" class="progress-ring">
                <circle id="progressCircle" stroke="#ef4444" stroke-width="10" fill="transparent" r="90" cx="95" cy="95" class="progress-ring__circle"/>
            </svg>
        </div>
        <button onclick="location.href='index.html'" class="main-btn" style="background:#6b7280;margin-top:30px;" data-i18n="btn_back">العودة للرئيسية</button>
    </div>

    <div id="diagSection" class="glass-card">
        <h3 id="patientNameDisplay" style="color:var(--primary);text-align:center;margin-bottom:5px;"></h3>
        <p style="text-align:center;font-size:13px;opacity:0.6;margin-bottom:20px;" data-i18n="diag_sub">أجب على الأسئلة لتحديد الحالة بدقة</p>
        <div class="step-indicator" id="stepDots"></div>
        <div id="loader" class="loader"></div>
        <div class="diag-form" id="diagForm"></div>
        <button id="analyzeBtn" class="main-btn" style="margin-top:20px;display:none;" data-i18n="btn_analyze">🔍 تحليل الحالة بالذكاء الاصطناعي</button>
    </div>

    <div id="resultSection" class="glass-card" style="display:none;">
        <h3 id="resultPatientName" style="color:var(--primary);text-align:center;margin-bottom:15px;"></h3>

        <!-- بطاقة تيليغرام -->
        <div class="tg-card" id="tgCard">
            <div class="tg-emoji pulsing" id="tgEmoji">📤</div>
            <div class="tg-body">
                <div class="tg-title" id="tgTitle" data-i18n="tg_sending">جاري إرسال تنبيه تيليغرام...</div>
                <div class="tg-detail" id="tgDetail"></div>
            </div>
        </div>

        <div class="result-box">
            <h4 style="color:#10b981;margin:0 0 8px;" data-i18n="em_action">الإجراء المطلوب:</h4>
            <p id="resultText" data-i18n="em_result">الحالة تتطلب رعاية فورية.</p>
        </div>

        <div class="ai-box">
            <h4><span>🤖</span> <span data-i18n="ai_analysis_title">تحليل الذكاء الاصطناعي</span></h4>
            <div id="aiAnalysisText"><span style="opacity:0.5;" data-i18n="loading">جاري التحليل...</span></div>
            <div class="media-box" id="mediaBox" style="display:none;">
                <h4 style="font-size:14px;margin-bottom:10px;" data-i18n="media_title">📚 وسائط مساعدة:</h4>
                <div class="media-grid" id="mediaGrid"></div>
            </div>
        </div>

        <div id="extraQBox" style="display:none; margin-bottom:12px;">
            <div class="ai-box" style="border-color:#f59e0b;border-right-color:#f59e0b;background:rgba(245,158,11,0.07);">
                <h4 style="color:#f59e0b;">⚠️ <span data-i18n="extra_q_title">يحتاج معلومات إضافية</span></h4>
                <div class="diag-form" id="extraDiagForm"></div>
                <button id="reAnalyzeBtn" class="main-btn" style="background:#f59e0b;margin-top:10px;" data-i18n="btn_reanalyze">🔄 إعادة التحليل</button>
            </div>
        </div>

        <button id="saveExitBtn" class="main-btn" style="background:#10b981;" data-i18n="btn_save_exit">✅ حفظ التقرير وإنهاء</button>
        <button onclick="location.href='index.html'" class="main-btn" style="background:#6b7280;" data-i18n="btn_cancel">❌ إلغاء والعودة</button>
    </div>
</div>

<div id="imgModal" onclick="closeModal()">
    <span onclick="closeModal()">✕</span>
    <img id="modalImg" src="" alt="">
</div>

<script src="config.js"></script>
<script type="module">
import { db } from './js/firebase-config.js';
import { ref, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { askGroq } from './js/gemini-ai.js';

// ── إعدادات Telegram Bot ──
// عشان تشتغل: ابعث لـ @BotFather وسوّي بوت، خذ الـ token وحطه هنا
// المستخدم يحصل على chat_id من بوت @userinfobot
const TG_BOT_TOKEN = window.TG_BOT_TOKEN || "YOUR_BOT_TOKEN_HERE";
// (حطه في config.js: window.TG_BOT_TOKEN = "123456:ABC-DEF...")

const T = {
    ar: {
        em_title:"نظام LifeBand للطوارئ", em_hold:"اضغط مطولاً<br>لفتح الملف",
        btn_back:"العودة للرئيسية", diag_sub:"أجب على الأسئلة لتحديد الحالة بدقة",
        btn_analyze:"🔍 تحليل الحالة بالذكاء الاصطناعي",
        em_action:"الإجراء المطلوب:", em_result:"الحالة تتطلب رعاية فورية.",
        ai_analysis_title:"تحليل الذكاء الاصطناعي", media_title:"📚 وسائط مساعدة:",
        extra_q_title:"يحتاج معلومات إضافية", btn_reanalyze:"🔄 إعادة التحليل",
        btn_save_exit:"✅ حفظ التقرير وإنهاء", btn_cancel:"❌ إلغاء والعودة",
        alert_success:"✅ تم حفظ البلاغ بنجاح", lang_label:"EN",
        file_prefix:"ملف: ", loading:"جاري التحليل...",
        tg_sending:"📤 جاري إرسال تنبيه تيليغرام...",
        tg_sent:"✅ تم إرسال التنبيه عبر تيليغرام",
        tg_failed:"⚠️ تعذّر إرسال تنبيه تيليغرام",
        tg_no_id:"ℹ️ لا توجد جهة طوارئ مسجلة",
        tg_no_id_detail:"يمكن للمريض إضافة معرّف تيليغرام من ملفه الشخصي",
        tg_sent_detail:"وصل تنبيه تيليغرام تلقائي يتضمن الحالة الصحية الكاملة",
        tg_fail_detail:"تحقق من توكن البوت أو معرّف المستلم"
    },
    en: {
        em_title:"LifeBand Emergency System", em_hold:"Hold to<br>open file",
        btn_back:"Back to Home", diag_sub:"Answer questions to assess the situation",
        btn_analyze:"🔍 AI Diagnosis",
        em_action:"Required Action:", em_result:"Immediate care required.",
        ai_analysis_title:"AI Analysis", media_title:"📚 Support Media:",
        extra_q_title:"Needs More Info", btn_reanalyze:"🔄 Re-analyze",
        btn_save_exit:"✅ Save & Exit", btn_cancel:"❌ Cancel",
        alert_success:"✅ Report saved", lang_label:"AR",
        file_prefix:"File: ", loading:"Analyzing...",
        tg_sending:"📤 Sending Telegram alert...",
        tg_sent:"✅ Telegram alert sent successfully",
        tg_failed:"⚠️ Telegram alert failed",
        tg_no_id:"ℹ️ No emergency contact registered",
        tg_no_id_detail:"Patient can add their Telegram chat ID from their profile",
        tg_sent_detail:"Automatic Telegram alert with full health details was sent",
        tg_fail_detail:"Check bot token or recipient chat ID"
    }
};

const QUESTIONS = {
    ar: [
        { id:"q1", text:"ما الأعراض الظاهرة الآن؟", options:["فقدان الوعي","ألم في الصدر","صعوبة تنفس","نزيف","تشنجات","دوخة شديدة","غثيان/تقيؤ","لا شيء واضح"] },
        { id:"q2", text:"هل المريض يتجاوب مع النداء؟", options:["يتجاوب بشكل طبيعي","يتجاوب بضعف","لا يتجاوب أبداً"] },
        { id:"q3", text:"حالة التنفس:", options:["طبيعي","سريع وضحل","بطيء","متقطع","لا يتنفس"] },
        { id:"q4", text:"حالة الجلد:", options:["طبيعي","شاحب","أزرق/مزرق","متعرق بارد","محمر"] },
        { id:"q5", text:"هل وقع أو أصيب بصدمة؟", options:["نعم، سقوط","نعم، حادث","نعم، ضربة","لا يوجد إصابة"] }
    ],
    en: [
        { id:"q1", text:"Current visible symptoms?", options:["Unconscious","Chest pain","Breathing difficulty","Bleeding","Seizures","Severe dizziness","Nausea/vomiting","Nothing obvious"] },
        { id:"q2", text:"Does patient respond to voice?", options:["Responds normally","Responds weakly","No response"] },
        { id:"q3", text:"Breathing status:", options:["Normal","Fast & shallow","Slow","Irregular","Not breathing"] },
        { id:"q4", text:"Skin condition:", options:["Normal","Pale","Blue/cyanotic","Cold & sweaty","Flushed"] },
        { id:"q5", text:"Was there trauma/injury?", options:["Yes, fall","Yes, accident","Yes, impact","No injury"] }
    ]
};

const MEDIA_DB = {
    "قلب":   { imgs:["https://images.pexels.com/photos/4386466/pexels-photo-4386466.jpeg?w=400"], yt:[{id:"587-cZxLvss",t:"CPR"},{id:"n4k7zJnTl78",t:"الذبحة"}] },
    "تنفس":  { imgs:["https://images.pexels.com/photos/8942991/pexels-photo-8942991.jpeg?w=400"], yt:[{id:"hizBvK8bA6E",t:"هيملك"},{id:"0Ks2KRVMQME",t:"تنفس اصطناعي"}] },
    "نزيف":  { imgs:["https://images.pexels.com/photos/6823568/pexels-photo-6823568.jpeg?w=400"], yt:[{id:"IgCSSbF6hmE",t:"إيقاف النزيف"}] },
    "تشنج":  { imgs:["https://images.pexels.com/photos/3807571/pexels-photo-3807571.jpeg?w=400"], yt:[{id:"0Hf3ZNFCzLA",t:"نوبة الصرع"}] },
    "إغماء": { imgs:["https://images.pexels.com/photos/263337/pexels-photo-263337.jpeg?w=400"], yt:[{id:"4PqsEVgD1gg",t:"وضعية الإفاقة"}] },
    "default":{ imgs:["https://images.pexels.com/photos/1170979/pexels-photo-1170979.jpeg?w=400"], yt:[{id:"587-cZxLvss",t:"إسعافات أولية"}] }
};

let patientData={}, patientName="", patientId="", answers={}, extraAnswers={}, lastAnalysis="";
const lang = () => localStorage.getItem('preferred_lang') || 'ar';

function applyLang(l) {
    document.documentElement.lang = l;
    document.documentElement.dir  = l==='ar'?'rtl':'ltr';
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        if(k==='em_hold') el.innerHTML = T[l][k];
        else if(T[l][k])  el.innerText  = T[l][k];
    });
    document.getElementById('langBtn').innerText = T[l].lang_label;
    localStorage.setItem('preferred_lang', l);
}
document.getElementById('langBtn').onclick = () => applyLang(lang()==='ar'?'en':'ar');
applyLang(lang());

// ── hold-to-open ──
let progress=0, holdTimer;
const circle  = document.getElementById("progressCircle");
const holdBtn = document.getElementById("holdBtn");
const startHold = e => {
    e.preventDefault();
    holdTimer = setInterval(() => {
        progress += 2;
        circle.style.strokeDashoffset = 565.48 - (progress/100)*565.48;
        if(progress>=100){ clearInterval(holdTimer); loadPatientAndShowDiag(); }
    }, 30);
};
const cancelHold = () => { clearInterval(holdTimer); progress=0; circle.style.strokeDashoffset=565.48; };
holdBtn.addEventListener("mousedown", startHold);
holdBtn.addEventListener("touchstart", startHold, {passive:false});
window.addEventListener("mouseup", cancelHold);
window.addEventListener("touchend", cancelHold);

async function loadPatientAndShowDiag() {
    document.getElementById("triggerSection").style.display="none";
    document.getElementById("diagSection").style.display="block";
    document.getElementById("loader").style.display="block";

    patientId = new URLSearchParams(location.search).get("id") || "";
    if (patientId) {
        try {
            const snap = await get(ref(db, `users/${patientId}`));
            if(snap.exists()){ patientData=snap.val(); patientName=patientData.name||""; }
        } catch(e){ console.error(e); }
    }

    document.getElementById("loader").style.display="none";
    document.getElementById("patientNameDisplay").innerText = T[lang()].file_prefix + (patientName||"—");
    renderDiagForm(QUESTIONS[lang()], 'diagForm', answers);
    renderStepDots(QUESTIONS[lang()].length);
    document.getElementById("analyzeBtn").style.display="block";
    document.getElementById("analyzeBtn").onclick = () => runAnalysis(false);
}

function renderDiagForm(questions, containerId, answersObj) {
    document.getElementById(containerId).innerHTML = questions.map((q,i) => `
        <div class="diag-q">
            <label><span class="q-num">${i+1}</span>${q.text}</label>
            <div class="diag-options" id="opts_${q.id}">
                ${q.options.map(opt=>`
                    <button type="button" class="${answersObj[q.id]===opt?'selected':''}"
                        onclick="selectOption('${q.id}','${opt.replace(/'/g,"\\'")}','${containerId==='diagForm'?'main':'extra'}')">
                        ${opt}
                    </button>`).join('')}
            </div>
        </div>`).join('');
}

window.selectOption = (qId, val, type) => {
    const obj = type==='main'?answers:extraAnswers;
    obj[qId] = val;
    document.querySelectorAll(`#opts_${qId} button`).forEach(b => b.classList.toggle('selected', b.textContent.trim()===val));
    updateStepDots();
};

function renderStepDots(count) {
    document.getElementById('stepDots').innerHTML = Array.from({length:count},(_,i)=>`<div class="step-dot" id="dot_${i}"></div>`).join('');
    updateStepDots();
}
function updateStepDots() {
    QUESTIONS[lang()].forEach((q,i) => {
        const dot = document.getElementById(`dot_${i}`);
        if(!dot) return;
        dot.classList.toggle('done',   !!answers[q.id]);
        dot.classList.toggle('active', !answers[q.id]);
    });
}

async function runAnalysis(isExtra) {
    const l = lang();
    document.getElementById("diagSection").style.display="none";
    document.getElementById("resultSection").style.display="block";
    document.getElementById("resultPatientName").innerText = T[l].file_prefix + (patientName||"—");
    document.getElementById("aiAnalysisText").innerHTML = `<span style="opacity:0.5;">${T[l].loading}</span>`;
    document.getElementById("mediaBox").style.display="none";
    document.getElementById("extraQBox").style.display="none";

    // إرسال تيليغرام فوري — لا ينتظر AI
    sendTelegramAlert(l);

    const allAnswers    = isExtra?{...answers,...extraAnswers}:answers;
    const answerSummary = Object.entries(allAnswers).map(([k,v])=>`${k}: ${v}`).join('\n');
    const prompt = `أنت طبيب طوارئ خبير. المريض:\n- الاسم: ${patientName||'غير محدد'}\n- فصيلة الدم: ${patientData.bloodType||'غير محدد'}\n- أمراض مزمنة: ${(patientData.diseases||[]).join('، ')||'لا يوجد'}\nإجابات المسعف:\n${answerSummary}\nالمطلوب:\nالتشخيص: (جملة واحدة)\nالإجراء: (3-4 خطوات)\nالتصنيف: (قلب/تنفس/نزيف/تشنج/إغماء/أخرى)\nمعلومات_إضافية: نعم/لا`;

    try {
        const result = await askGroq(prompt);
        lastAnalysis = result;
        document.getElementById("aiAnalysisText").innerText = result;
        const catMatch = result.match(/التصنيف:\s*(\S+)/);
        showMedia(catMatch?catMatch[1]:'default');
        if((result.includes('معلومات_إضافية: نعم')||result.includes('معلومات_إضافية:نعم'))&&!isExtra) showExtraQuestions();
    } catch(e) {
        document.getElementById("aiAnalysisText").innerText = "⚠️ تعذّر الاتصال بـ AI. " + e.message;
    }
}

// ── إرسال تنبيه تيليغرام ──
async function sendTelegramAlert(l) {
    const card   = document.getElementById('tgCard');
    const title  = document.getElementById('tgTitle');
    const detail = document.getElementById('tgDetail');
    const emoji  = document.getElementById('tgEmoji');

    // tgChatId = معرّف المحادثة المحفوظ في ملف المريض
    if (!patientData.tgChatId) {
        card.className  = 'tg-card no-num';
        emoji.className = 'tg-emoji';
        emoji.innerText = 'ℹ️';
        title.innerText  = T[l].tg_no_id;
        detail.innerText = T[l].tg_no_id_detail;
        return;
    }

    title.innerText  = T[l].tg_sending;
    detail.innerText = '...';

    try {
        const diseaseArr = patientData.diseases || [];
        const diseaseTxt = diseaseArr.length ? diseaseArr.join(', ') : (l==='ar'?'لا يوجد':'None');
        const timestamp  = new Date().toLocaleString('ar-SA', { timeZone: 'Asia/Riyadh' });
        const emergencyUrl = `${location.origin}/emergency.html?id=${patientId}`;

        const msg = l==='ar'
            ? `🚨 *تنبيه طوارئ — LifeBand*\n\n👤 المريض: *${patientName||'—'}*\n🩸 فصيلة الدم: ${patientData.bloodType||'—'}\n💊 أمراض مزمنة: ${diseaseTxt}\n⏱ الوقت: ${timestamp}\n🔗 الملف الطبي: ${emergencyUrl}\n\n_يرجى التواصل فوراً_`
            : `🚨 *Emergency Alert — LifeBand*\n\n👤 Patient: *${patientName||'—'}*\n🩸 Blood Type: ${patientData.bloodType||'—'}\n💊 Conditions: ${diseaseTxt}\n⏱ Time: ${timestamp}\n🔗 Medical File: ${emergencyUrl}\n\n_Please respond immediately_`;

        const resp = await fetch(
            `https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id:    patientData.tgChatId,
                    text:       msg,
                    parse_mode: 'Markdown'
                })
            }
        );
        const data = await resp.json();

        if (data.ok) {
            card.className  = 'tg-card sent';
            emoji.className = 'tg-emoji';
            emoji.innerText = '✅';
            title.innerText  = T[l].tg_sent;
            detail.innerText = T[l].tg_sent_detail;

            // تسجيل في Firebase
            try {
                await push(ref(db, `tg_logs/${patientId}`), {
                    chatId: patientData.tgChatId,
                    sentAt: new Date().toISOString(),
                    status: 'sent'
                });
            } catch(_) {}
        } else {
            throw new Error(data.description || 'Telegram error');
        }
    } catch(err) {
        card.className  = 'tg-card failed';
        emoji.className = 'tg-emoji';
        emoji.innerText = '⚠️';
        title.innerText  = T[l].tg_failed;
        detail.innerText = T[l].tg_fail_detail;
        console.error('Telegram error:', err);
    }
}

function showMedia(category) {
    const key  = Object.keys(MEDIA_DB).find(k=>category.includes(k))||'default';
    const media = MEDIA_DB[key];
    const grid  = document.getElementById("mediaGrid");
    grid.innerHTML = '';
    media.imgs.forEach(src => {
        const img = document.createElement('img');
        img.src=src; img.className='media-img'; img.onclick=()=>openModal(src);
        grid.appendChild(img);
    });
    media.yt.forEach(v => {
        const div = document.createElement('div');
        div.className='yt-thumb';
        div.innerHTML=`<img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="${v.t}"><div class="play-icon">▶️</div>`;
        div.onclick=()=>window.open(`https://www.youtube.com/watch?v=${v.id}`,'_blank');
        grid.appendChild(div);
    });
    document.getElementById("mediaBox").style.display="block";
}

function showExtraQuestions() {
    const l = lang();
    const extraQs = [
        {id:"eq1", text:l==='ar'?"متى بدأت الأعراض؟":"When did symptoms start?", options:l==='ar'?["منذ دقائق","منذ ساعة","أكثر من ساعة","لا أعلم"]:["Minutes ago","1 hour ago","Over an hour","Unknown"]},
        {id:"eq2", text:l==='ar'?"هل يعاني من حساسية لأدوية؟":"Any medication allergies?", options:l==='ar'?["نعم","لا","لا أعلم"]:["Yes","No","Unknown"]},
        {id:"eq3", text:l==='ar'?"هل أخذ أي دواء اليوم؟":"Took medication today?", options:l==='ar'?["نعم","لا","لا أعلم"]:["Yes","No","Unknown"]}
    ];
    renderDiagForm(extraQs,'extraDiagForm',extraAnswers);
    document.getElementById("extraQBox").style.display="block";
    document.getElementById("reAnalyzeBtn").onclick=()=>runAnalysis(true);
}

window.openModal  = src => { document.getElementById("modalImg").src=src; document.getElementById("imgModal").classList.add("open"); };
window.closeModal = ()  => document.getElementById("imgModal").classList.remove("open");

document.getElementById('saveExitBtn').addEventListener('click', async () => {
    const l   = lang();
    const btn = document.getElementById('saveExitBtn');
    btn.disabled=true; btn.innerText=l==='ar'?'⏳ جاري الحفظ...':'⏳ Saving...';
    try {
        await push(ref(db,"reports"),{
            patientName,
            diagnosis:   lastAnalysis||document.getElementById("aiAnalysisText").innerText,
            bloodType:   patientData.bloodType||'',
            diseases:    patientData.diseases||[],
            tgAlertSent: !!patientData.tgChatId,
            timestamp:   new Date().toISOString(),
            status:      "قيد الانتظار"
        });
        alert(T[l].alert_success);
        location.href="index.html";
    } catch(e) {
        btn.disabled=false; btn.innerText=T[l].btn_save_exit;
        alert("Error: "+e.message);
    }
});
