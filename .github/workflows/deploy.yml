name: Deploy LifeBand to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build config.js from secrets
        run: |
          cat > config.js << 'ENDOFFILE'
          window.GROQ_KEY     = "${{ secrets.GROQ_KEY }}";
          window.GEMINI_KEY   = "${{ secrets.GEMINI_KEY }}";
          window.TG_BOT_TOKEN = "${{ secrets.TG_BOT_TOKEN }}";
          ENDOFFILE

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_TOKEN }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live