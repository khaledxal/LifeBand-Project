name: Deploy LifeBand to Firebase

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Functions dependencies
        run: cd functions && npm install

      # ✅ حقن الـ Secrets في index.js وقت الـ deploy فقط
      # الكود في GitHub يبقى نظيف — الـ secrets تُضاف مؤقتاً هنا
      - name: Inject Twilio credentials
        run: |
          sed -i "s|__TWILIO_SID__|${{ secrets.TWILIO_SID }}|g"   functions/index.js
          sed -i "s|__TWILIO_TOKEN__|${{ secrets.TWILIO_TOKEN }}|g" functions/index.js
          sed -i "s|__TWILIO_FROM__|${{ secrets.TWILIO_FROM }}|g"   functions/index.js

      - name: Deploy to Firebase
        run: firebase deploy --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive