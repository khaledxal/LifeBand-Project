name: Deploy LifeBand to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build config.js from secrets
        run: |
          cat > config.js << 'ENDOFFILE'
          window.GROQ_KEY     = "${{ secrets.GROQ_KEY }}";
          window.GEMINI_KEY   = "${{ secrets.GEMINI_KEY }}";
          window.TG_BOT_TOKEN = "${{ secrets.TG_BOT_TOKEN }}";
          ENDOFFILE

      - name: Inject GROQ_KEY into gemini-ai.js
        # تم تغيير ' إلى " لضمان قراءة السر من GitHub بشكل صحيح
        run: |
          sed -i "s/__GROQ_KEY__/${{ secrets.GROQ_KEY }}/g" gemini-ai.js

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_TOKEN }}
          projectId: lifeband-affa0
          channelId: live