name: Deploy LifeBand to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # تحميل المشروع
      - name: Checkout
        uses: actions/checkout@v4

      # إنشاء ملف config.js من الـ secrets
      - name: Build config.js from secrets
        run: |
          cat <<EOF > config.js
          window.GROQ_KEY="${{ secrets.GROQ_KEY }}";
          window.GEMINI_KEY="${{ secrets.GEMINI_KEY }}";
          window.TG_BOT_TOKEN="${{ secrets.TG_BOT_TOKEN }}";
          EOF

      # استبدال __GROQ_KEY__ في أي ملف بالمشروع
      - name: Inject secrets into project files
        run: |
          grep -rl "__GROQ_KEY__" . | xargs -r sed -i "s|__GROQ_KEY__|${{ secrets.GROQ_KEY }}|g" || true
          grep -rl "__GEMINI_KEY__" . | xargs -r sed -i "s|__GEMINI_KEY__|${{ secrets.GEMINI_KEY }}|g" || true
          grep -rl "__TG_BOT_TOKEN__" . | xargs -r sed -i "s|__TG_BOT_TOKEN__|${{ secrets.TG_BOT_TOKEN }}|g" || true

      # نشر المشروع على Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_TOKEN }}
          projectId: lifeband-affa0
          channelId: live
