name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  inject-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Inject Gemini Key into config.js
        run: |
          echo "window.GEMINI_KEY = \"${{ secrets.GEMINI_KEY }}\";" > config.js

      - name: Commit config.js to main
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add config.js
          git diff --staged --quiet || git commit -m "ci: inject config [skip ci]"
          git push