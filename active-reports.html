<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البلاغات النشطة - LifeBand</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .reports-container { padding: 40px 20px; }
        .report-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 20px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .respond-btn { background: #10b981 !important; width: auto !important; padding: 10px 25px !important; }
        .lang-toggle { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-main); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; transition: 0.3s; }
    </style>
</head>
<body class="page-fade">
    <div class="bg-animation"></div>
    <div class="container">
        <header class="navbar">
            <a href="index.html" class="nav-brand">LifeBand</a>
            <div id="auth-zone">
                <a href="active-reports.html" class="nav-item" data-i18n="nav_active">البلاغات المتواجدة</a>
                <a href="history.html" class="nav-item" data-i18n="nav_history">سجل الحالات</a>
                <a href="rewards.html" class="nav-item" data-i18n="nav_rewards">المكافآت</a>
            </div>
            <div class="nav-links" style="display: flex; gap: 10px; align-items: center;">
                <button class="lang-toggle" id="langBtn">EN</button>
                <button class="theme-toggle" id="themeBtn">🌙</button>
            </div>
        </header>

        <main class="reports-container">
            <h2 data-i18n="reports_title">⚠️ البلاغات الحالية</h2>
            <div id="reportsList" style="margin-top: 25px;"></div>
        </main>
    </div>

    <script src="config.js"></script>
<script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { suggestDiagnosis } from './js/gemini-ai.js';

        // --- نظام اللغة والثيم الموحد ---
        const t = {
            ar: { nav_active: "البلاغات المتواجدة", nav_history: "سجل الحالات", nav_rewards: "المكافآت", reports_title: "⚠️ البلاغات الحالية", btn_respond: "مباشرة الحالة", empty: "لا توجد بلاغات حالياً", lang_label: "EN" },
            en: { nav_active: "Active Reports", nav_history: "Case History", nav_rewards: "Rewards", reports_title: "⚠️ Active Reports", btn_respond: "Respond", empty: "No active reports", lang_label: "AR" }
        };

        function setLanguage(lang) {
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = t[lang][el.getAttribute('data-i18n')]; });
            document.getElementById('langBtn').innerText = t[lang].lang_label;
            localStorage.setItem('preferred_lang', lang);
        }

        document.getElementById('langBtn').onclick = () => {
            const current = localStorage.getItem('preferred_lang') || 'ar';
            setLanguage(current === 'ar' ? 'en' : 'ar');
            window.location.reload(); 
        };

        const themeBtn = document.getElementById('themeBtn');
        function applyTheme(theme) {
            document.body.setAttribute('data-theme', theme === 'dark' ? 'dark' : '');
            themeBtn.innerText = theme === 'dark' ? '☀️' : '🌙';
        }
        applyTheme(localStorage.getItem('theme') || 'light');
        themeBtn.onclick = () => {
            const nt = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', nt);
            applyTheme(nt);
        };

        setLanguage(localStorage.getItem('preferred_lang') || 'ar');

        // --- جلب البيانات ---
        const reportsList = document.getElementById('reportsList');
        const currentLang = localStorage.getItem('preferred_lang') || 'ar';

        onValue(ref(db, 'reports'), (snapshot) => {
            reportsList.innerHTML = "";
            snapshot.forEach((child) => {
                const data = child.val();
                if (data.status === "قيد الانتظار") {
                    const card = document.createElement('div');
                    card.className = 'report-card';
                    card.innerHTML = `
                        <div class="report-info">
                            <h3>${data.patientName || 'Unknown'}</h3>
                            <p>${data.diagnosis}</p>
                        </div>
                        <div style="display:flex; flex-direction:column; gap:8px; align-items:flex-end;">
                            <button class="main-btn respond-btn" onclick="handleResponse('${child.key}')">${t[currentLang].btn_respond}</button>
                            <button class="main-btn" style="background:#6366f1; width:auto; padding:8px 16px; font-size:13px;" onclick="showAIDiagnosis('${child.key}', '${data.patientName}', '${JSON.stringify(data.diseases||[]).replace(/'/g,'')}', '${data.bloodType||''}')">🤖 ${currentLang==='ar'?'تحليل AI':'AI Analysis'}</button>
                        </div>
                    `;
                    // إضافة صندوق AI قابل للطي
                    const aiDiv = document.createElement('div');
                    aiDiv.id = `ai_${child.key}`;
                    aiDiv.style.cssText = "display:none; background:rgba(99,102,241,0.07); border:1px solid rgba(99,102,241,0.25); border-radius:12px; padding:15px; margin-top:10px; font-size:14px; line-height:1.8;";
                    aiDiv.innerHTML = `<span style="color:#6366f1; font-weight:bold;">🤖 ${currentLang==='ar'?'تحليل الذكاء الاصطناعي:':'AI Diagnosis:'}</span><br><span id="aitxt_${child.key}">...</span>`;
                    card.appendChild(aiDiv);
                    reportsList.appendChild(card);
                }
            });
            if (!reportsList.innerHTML) reportsList.innerHTML = `<p>${t[currentLang].empty}</p>`;
        });

        window.handleResponse = async (id) => {
            const user = auth.currentUser;
            if (user) await update(ref(db, `reports/${id}`), { status: "تمت المباشرة", rescuerId: user.uid });
        };

        window.showAIDiagnosis = async (id, name, diseasesJson, bloodType) => {
            const aiDiv = document.getElementById(`ai_${id}`);
            const aiTxt = document.getElementById(`aitxt_${id}`);
            if (!aiDiv) return;
            if (aiDiv.style.display === 'block') { aiDiv.style.display = 'none'; return; }
            aiDiv.style.display = 'block';
            aiTxt.innerText = '⏳ جاري تحليل الحالة...';
            try {
                let diseases = [];
                try { diseases = JSON.parse(diseasesJson); } catch(e) {}
                const result = await suggestDiagnosis(name, diseases, bloodType);
                aiTxt.innerText = result;
            } catch(e) {
                aiTxt.innerText = '⚠️ تعذّر الاتصال بـ AI. تأكد من مفتاح Gemini.';
            }
        };
    </script>
</body>
</html>
